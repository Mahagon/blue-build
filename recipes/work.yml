---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: work-cosmic-desktop
description: Fedora COSMIC Atomic image for work
base-image: quay.io/fedora-ostree-desktops/cosmic
image-version: 43
modules:
  - type: rpm-ostree
    install:
      - htop
    remove:
      - firefox
      - firefox-langpacks
  - type: default-flatpaks
    notify: true
    system:
      repo-url: https://dl.flathub.org/repo/flathub.flatpakrepo
      repo-name: flathub
      repo-title: "Flathub (system-wide)"
      install:
        - com.visualstudio.code
        - com.brave.Browser
        - io.dbeaver.DBeaverCommunity
        - io.dbeaver.DBeaverCommunity.Client.pgsql
        - io.dbeaver.DBeaverCommunity.Client.mariadb
        - io.github.peazip.PeaZip
  - type: files
    files:
      - source: system
        destination: /
