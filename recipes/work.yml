---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: work-cosmic-desktop
description: Fedora COSMIC Atomic image for work
base-image: quay.io/fedora-ostree-desktops/cosmic-atomic
image-version: 43
modules:
  - type: files
    files:
      - source: shared
        destination: /
      - source: work
        destination: /
  - type: rpm-ostree
    repos:
      - https://rpm.releases.hashicorp.com/fedora/hashicorp.repo
      - https://packages.microsoft.com/yumrepos/vscode/config.repo
      - https://copr.fedorainfracloud.org/coprs/atim/starship/repo/fedora-%OS_VERSION%/atim-starship-fedora-%OS_VERSION%.repo
      - https://brave-browser-rpm-release.s3.brave.com/brave-browser.repo
    install:
      - brave-browser
      - htop
      - code
      - kubernetes-client
      - just
      - helm
      - terraform
      - k9s
      - gh
      - ghc-git-lfs
      - tig
      - azure-cli
      - awscli2
      - openconnect
      - NetworkManager-openconnect
      - NetworkManager-openconnect-gnome
      - gnome-keyring
      - chezmoi
      - starship
      - pre-commit
      - uv
      - nodejs
      - fzf
      - yamllint
      - pylint
      - openssl
    remove:
      - firefox
      - firefox-langpacks
  - type: containerfile
    snippets:
      - RUN setcap cap_net_admin=eip /usr/bin/openconnect
  - type: script
    scripts:
      - shared/install-bw.sh
      - shared/install-shfmt.sh
      - shared/install-prettier.sh
      - shared/install-yq.sh
      - shared/install-argonaut.sh
      - work/install-granted.sh
      - work/install-helm-diff.sh
      - work/install-helmfile.sh
      - work/install-kubelogin.sh
      - work/install-tflint.sh
      - work/install-gh-dash.sh
      - work/install-terraform-tui.sh
      - work/install-eks-node-viewer.sh
      - work/install-podman-tui.sh
  - type: default-flatpaks
    configurations:
      - scope: system
        repo-url: https://dl.flathub.org/repo/flathub.flatpakrepo
        repo-name: flathub
        install:
          - io.dbeaver.DBeaverCommunity
          - io.dbeaver.DBeaverCommunity.Client.pgsql
          - io.dbeaver.DBeaverCommunity.Client.mariadb
          - io.github.peazip.PeaZip
          - com.bitwarden.desktop
          - com.github.IsmaelMartinez.teams_for_linux
  - type: signing
