---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: work-cosmic-desktop
description: Fedora COSMIC Atomic image for work
base-image: quay.io/fedora-ostree-desktops/cosmic-atomic
image-version: 43
modules:
  - type: rpm-ostree
    repos:
      - https://rpm.releases.hashicorp.com/fedora/hashicorp.repo
      - https://packages.microsoft.com/yumrepos/vscode/config.repo
    install:
      - htop
      - code
      - kubernetes-client
      - helm
      - terraform
      - k9s
      - gh
      - tig
      - azure-cli
      - awscli2
      - openconnect
      - NetworkManager-openconnect
      - NetworkManager-openconnect-gnome
      - gnome-keyring
      - chezmoi
    remove:
      - firefox
      - firefox-langpacks
  - type: containerfile
    snippets:
      - RUN setcap cap_net_admin=eip /usr/bin/openconnect
  - type: script
    scripts:
      - install-bw.sh
      - install-granted.sh
      - install-helm-diff.sh
      - install-helmfile.sh
      - install-kubelogin.sh
  - type: default-flatpaks
    configurations:
      - scope: system
        repo-url: https://dl.flathub.org/repo/flathub.flatpakrepo
        repo-name: flathub
        install:
          - com.brave.Browser
          - io.dbeaver.DBeaverCommunity
          - io.dbeaver.DBeaverCommunity.Client.pgsql
          - io.dbeaver.DBeaverCommunity.Client.mariadb
          - io.github.peazip.PeaZip
          - com.bitwarden.desktop
          - com.github.IsmaelMartinez.teams_for_linux
  - type: files
    files:
      - source: system
        destination: /
