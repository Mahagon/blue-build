---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: gaming-desktop
description: Bazzite-based gaming desktop with KDE Plasma
base-image: ghcr.io/ublue-os/bazzite
image-version: stable
modules:
  - type: files
    files:
      - source: shared
        destination: /
      - source: gaming
        destination: /
  - type: rpm-ostree
    repos:
      - https://packages.microsoft.com/yumrepos/vscode/config.repo
      - https://copr.fedorainfracloud.org/coprs/atim/starship/repo/fedora-%OS_VERSION%/atim-starship-fedora-%OS_VERSION%.repo
      - https://brave-browser-rpm-release.s3.brave.com/brave-browser.repo
      - https://copr.fedorainfracloud.org/coprs/jstaf/onedriver/repo/fedora-%OS_VERSION%/jstaf-onedriver-fedora-%OS_VERSION%.repo
    install:
      - brave-browser
      - htop
      - code
      - kubernetes-client
      - just
      - helm
      - k9s
      - gh
      - tig
      - chezmoi
      - starship
      - pre-commit
      - fzf
      - nodejs
      - pavucontrol
      - kitty
      - vlc
      - onedriver
      - ksshaskpass
      - pinentry-qt
  - type: script
    scripts:
      - shared/install-bw.sh
      - shared/install-shfmt.sh
      - shared/install-prettier.sh
      - shared/install-yq.sh
      - shared/install-argonaut.sh
      - gaming/install-hytale.sh
  - type: default-flatpaks
    configurations:
      - scope: system
        repo-url: https://dl.flathub.org/repo/flathub.flatpakrepo
        repo-name: flathub
        install:
          - io.dbeaver.DBeaverCommunity
          - io.dbeaver.DBeaverCommunity.Client.pgsql
          - com.bitwarden.desktop
          - com.discordapp.Discord
          - com.spotify.Client
          - com.usebottles.bottles

  - type: signing
