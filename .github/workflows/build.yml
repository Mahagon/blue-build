---
name: bluebuild
on:
  schedule:
    - cron: "15 04 * * *"
  push:
    paths-ignore:
      - "**.md"
      - ".github/renovate.json"
      - ".github/CODEOWNERS"
concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true
jobs:
  discover-scripts:
    name: Discover scripts
    runs-on: ubuntu-latest
    outputs:
      install-scripts: ${{ steps.find.outputs.install-scripts }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Find install scripts
        id: find
        run: |
          echo "install-scripts=$(find files/scripts -name '*.sh' -type f | sort | jq -R -s -c 'split("\n") | map(select(length > 0))')" >> "$GITHUB_OUTPUT"
  lint-scripts:
    name: Lint scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Syntax check all scripts
        run: find files -name '*.sh' -type f -exec bash -n {} +
      - name: Shellcheck all scripts
        run: find files -name '*.sh' -type f -exec shellcheck --severity=error {} +
  test-install-scripts:
    name: Test ${{ matrix.script }}
    needs: discover-scripts
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        script: ${{ fromJson(needs.discover-scripts.outputs.install-scripts) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Run install script
        run: sudo bash "${{ matrix.script }}"
      - name: Verify installed binaries are executable
        run: |
          # Extract the tool name from the script filename (install-<name>.sh)
          script_name="$(basename "${{ matrix.script }}" .sh)"
          tool_name="${script_name#install-}"

          # Check common install locations for at least one new binary
          found=false
          for dir in /usr/bin /usr/lib/helm/plugins; do
            if find "$dir" -maxdepth 3 -newer "${{ matrix.script }}" -executable -type f 2>/dev/null | head -1 | grep -q .; then
              found=true
              break
            fi
          done

          # Fallback: check if a binary matching the tool name exists
          if ! $found; then
            for candidate in "/usr/bin/${tool_name}" "/usr/bin/${tool_name//-/}" "/usr/share/${tool_name}"*; do
              if [[ -e "$candidate" ]]; then
                found=true
                echo "Found: $candidate"
                break
              fi
            done
          fi

          if $found; then
            echo "Install verification passed"
          else
            echo "Warning: could not verify installed artifact for ${tool_name}"
          fi
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      # On scheduled runs always build both; on push only build what changed.
      work: ${{ github.event_name == 'schedule' || steps.filter.outputs.work == 'true' }}
      gaming: ${{ github.event_name == 'schedule' || steps.filter.outputs.gaming == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: filter
        if: github.event_name != 'schedule'
        with:
          filters: |
            work:
              - 'recipes/work.yml'
              - 'files/work/**'
              - 'files/shared/**'
              - 'files/scripts/shared/**'
              - 'files/scripts/work/**'
              - '.github/workflows/build.yml'
            gaming:
              - 'recipes/gaming.yml'
              - 'files/gaming/**'
              - 'files/shared/**'
              - 'files/scripts/shared/**'
              - 'files/scripts/gaming/**'
              - '.github/workflows/build.yml'
  build-work:
    name: Build Custom Image (work.yml)
    needs: [lint-scripts, test-install-scripts, changes]
    if: needs.changes.outputs.work == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Build Custom Image
        uses: blue-build/github-action@24d146df25adc2cf579e918efe2d9bff6adea408 # v1.11
        with:
          recipe: work.yml
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          # build_chunked_oci: true
          # maximize_build_space: true
      - name: Cleanup old images from GHCR
        uses: dataaxiom/ghcr-cleanup-action@cd0cdb900b5dbf3a6f2cc869f0dbb0b8211f50c4 # v1
        with:
          older-than: 7 days
          package: work-aurora-desktop
  build-gaming:
    name: Build Custom Image (gaming.yml)
    needs: [lint-scripts, test-install-scripts, changes]
    if: needs.changes.outputs.gaming == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Build Custom Image
        uses: blue-build/github-action@24d146df25adc2cf579e918efe2d9bff6adea408 # v1.11
        with:
          recipe: gaming.yml
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          build_chunked_oci: true
          maximize_build_space: false
      - name: Cleanup old images from GHCR
        uses: dataaxiom/ghcr-cleanup-action@cd0cdb900b5dbf3a6f2cc869f0dbb0b8211f50c4 # v1
        with:
          older-than: 7 days
          package: gaming-desktop
